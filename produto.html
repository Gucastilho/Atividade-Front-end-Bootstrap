<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrend - Produto</title>
    <link rel="stylesheet" href="./bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="index.html"><strong>EcoTrend</strong></a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                    <li class="nav-item ms-3">
                        <a href="#" class="text-white"><i class="fa fa-shopping-cart fa-lg"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row bg-white p-5 rounded shadow-sm">
            <div class="col-md-6 mb-4">
                <img id="img-produto" src="" class="img-fluid rounded" alt="Produto">
            </div>
            <div class="col-md-6 d-flex flex-column justify-content-center">
                <h2 id="titulo-produto">Carregando...</h2>
                <h3 id="preco-produto" class="text-success my-3"></h3>
                <p id="desc-produto" class="text-muted"></p>
                
                <ul id="lista-detalhes" class="mb-4">
                    </ul>
                
                <button class="btn btn-success btn-lg mt-auto"><i class="fa fa-cart-plus me-2"></i> Adicionar ao Carrinho</button>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center p-4 mt-5">
        <div class="container">
            <p>© 2025 EcoTrend. Promovendo sustentabilidade.</p>
        </div>
    </footer>

    <script src="./bootstrap.bundle.min.js"></script>
    
    <script>
        const produtos = {
            'camisa': {
                nome: 'Camiseta Orgânica',
                preco: 'R$ 89,90',
                img: './img/produtos/Camiseta.jpg',
                desc: 'Produzida com algodão 100% orgânico e tingimento natural. Ideal para o dia a dia, promovendo o menor impacto ambiental possível.',
                detalhes: ['Tamanho: Único', 'Material: Algodão Reciclado', 'Selo: EcoFriendly Certified']
            },
            'sabonete': {
                nome: 'Sabonete Natural',
                preco: 'R$ 25,90',
                img: './img/produtos/Sabonete.jpg',
                desc: 'Sabonete 100% natural feito com óleos essenciais e ingredientes orgânicos, livre de parabenos e conservantes.',
                detalhes: ['Peso: 100g', 'Material: Glicerina Vegetal e Óleos Essenciais', 'Selo: Cruelty-Free']
            },
            'ecobag': {
                nome: 'Ecobag Sustentável',
                preco: 'R$ 45,00',
                img: './img/produtos/EcoBag.jpg',
                desc: 'Sacola reutilizável super resistente, ideal para compras de mercado e para substituir de vez as sacolas plásticas.',
                detalhes: ['Tamanho: 40x40cm', 'Material: Juta e Algodão', 'Selo: Lixo Zero']
            },
            'bambu': {
                nome: 'Kit Escovas de Bambu',
                preco: 'R$ 35,50',
                img: './img/produtos/Kit.jpg',
                desc: 'Kit completo com escovas de dente e pente feitos de bambu 100% biodegradável.',
                detalhes: ['Quantidade: 4 itens', 'Material: Bambu e cerdas macias', 'Selo: Planet Friendly']
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('item');

        if (itemId && produtos[itemId]) {
            const prod = produtos[itemId];
            
            document.getElementById('img-produto').src = prod.img;
            document.getElementById('titulo-produto').innerText = prod.nome;
            document.getElementById('preco-produto').innerText = prod.preco;
            document.getElementById('desc-produto').innerText = prod.desc;

            const lista = document.getElementById('lista-detalhes');
            lista.innerHTML = ''; 
            prod.detalhes.forEach(detalhe => {
                let li = document.createElement('li');
                li.innerText = detalhe;
                lista.appendChild(li);
            });
        } else {
            document.getElementById('titulo-produto').innerText = 'Produto não encontrado';
            document.getElementById('desc-produto').innerText = 'Por favor, volte à página inicial e escolha um produto válido.';
        }
    </script>
</body>
</html>
