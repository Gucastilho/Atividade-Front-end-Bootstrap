<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoTrend - Home</title>
    <link rel="stylesheet" href="./bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="index.html"><strong>EcoTrend</strong></a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                    <li class="nav-item ms-3">
                        <a href="#" class="text-white"><i class="fa fa-shopping-cart fa-lg"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <div id="banner" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="./img/banners/Eco.jpg" class="d-block w-100" alt="Natureza">
                </div>
                <div class="carousel-item">
                    <img src="./img/banners/Eco2.jpg" class="d-block w-100" alt="Sustentabilidade">
                </div>
            </div>
            <button class="carousel-control-prev" data-bs-target="#banner" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" data-bs-target="#banner" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

        <section class="container mt-5">
            <h2 class="text-center mb-4">Destaques Sustentáveis</h2>
            <div class="produto-grid">
                <div class="card">
                    <img src="./img/produtos/Camiseta.jpg" class="card-img-top" alt="Camiseta">
                    <div class="card-body text-center">
                        <h5 class="card-title">Camiseta Orgânica</h5>
                        <p class="card-text text-success fw-bold">R$ 89,90</p>
                        <a href="produto.html?item=camisa" class="btn btn-success">Ver Produto</a>
                    </div>
                </div>
                <div class="card">
                    <img src="./img/produtos/Sabonete.jpg" class="card-img-top" alt="Sabonete">
                    <div class="card-body text-center">
                        <h5 class="card-title">Sabonete Natural</h5>
                        <p class="card-text text-success fw-bold">R$ 25,90</p>
                        <a href="produto.html?item=sabonete" class="btn btn-success">Ver Produto</a>
                    </div>
                </div>
                <div class="card">
                    <img src="./img/produtos/EcoBag.jpg" class="card-img-top" alt="Ecobag">
                    <div class="card-body text-center">
                        <h5 class="card-title">Ecobag Sustentável</h5>
                        <p class="card-text text-success fw-bold">R$ 45,00</p>
                        <a href="produto.html?item=ecobag" class="btn btn-success">Ver Produto</a>
                    </div>
                </div>
                <div class="card">
                    <img src="./img/produtos/Kit.jpg" class="card-img-top" alt="Kit de Bambu">
                    <div class="card-body text-center">
                        <h5 class="card-title">Kit Escovas Bambu</h5>
                        <p class="card-text text-success fw-bold">R$ 35,50</p>
                        <a href="produto.html?item=bambu" class="btn btn-success">Ver Produto</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white text-center p-4 mt-5">
        <div class="container">
            <p>© 2025 EcoTrend. Promovendo sustentabilidade.</p>
            <div>
                <a href="#" class="text-white me-3"><i class="fab fa-instagram fa-lg"></i></a>
                <a href="#" class="text-white me-3"><i class="fab fa-facebook fa-lg"></i></a>
                <a href="#" class="text-white"><i class="fab fa-linkedin fa-lg"></i></a>
            </div>
        </div>
    </footer>

    <script src="./bootstrap.bundle.min.js"></script>
</body>
</html>
