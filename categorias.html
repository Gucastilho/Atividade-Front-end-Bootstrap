<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrend - Categorias</title>
    <link rel="stylesheet" href="./bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="index.html"><strong>EcoTrend</strong></a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="categorias.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                    <li class="nav-item ms-3">
                        <a href="#" class="text-white"><i class="fa fa-shopping-cart fa-lg"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row">
            <aside class="col-md-3 mb-4">
                <div class="bg-white p-4 rounded shadow-sm">
                    <h4>Filtros</h4>
                    <hr>
                    <label class="form-label mt-3">Preço Máximo: <span id="precoValor">R$ 200</span></label>
                    <input type="range" class="form-range" min="0" max="500" value="200" oninput="document.getElementById('precoValor').innerText = 'R$ ' + this.value">

                    <label class="form-label mt-3">Marca</label>
                    <select class="form-select">
                        <option>Todas</option>
                        <option>EcoLife</option>
                        <option>GreenTech</option>
                    </select>
                </div>
            </aside>

            <section class="col-md-9">
                <div class="produto-grid mt-0">
                    
                    <div class="card">
                        <img src="./img/produtos/Camiseta.jpg" class="card-img-top" alt="Camiseta Orgânica">
                        <div class="card-body text-center">
                            <h5>Camiseta Orgânica</h5>
                            <p class="text-success fw-bold">R$ 89,90</p>
                            <a href="produto.html?item=camisa" class="btn btn-success w-100 mb-2">Ver Produto</a>
                        </div>
                    </div>
                    
                    <div class="card">
                        <img src="./img/produtos/Sabonete.jpg" class="card-img-top" alt="Sabonete Natural">
                        <div class="card-body text-center">
                            <h5>Sabonete Natural</h5>
                            <p class="text-success fw-bold">R$ 25,90</p>
                            <a href="produto.html?item=sabonete" class="btn btn-success w-100 mb-2">Ver Produto</a>
                        </div>
                    </div>

                    <div class="card">
                        <img src="./img/produtos/EcoBag.jpg" class="card-img-top" alt="Ecobag Sustentável">
                        <div class="card-body text-center">
                            <h5>Ecobag Sustentável</h5>
                            <p class="text-success fw-bold">R$ 45,00</p>
                            <a href="produto.html?item=ecobag" class="btn btn-success w-100 mb-2">Ver Produto</a>
                        </div>
                    </div>

                    <div class="card">
                        <img src="./img/produtos/Kit.jpg" class="card-img-top" alt="Kit Escovas Bambu">
                        <div class="card-body text-center">
                            <h5>Kit Escovas Bambu</h5>
                            <p class="text-success fw-bold">R$ 35,50</p>
                            <a href="produto.html?item=bambu" class="btn btn-success w-100 mb-2">Ver Produto</a>
                        </div>
                    </div>

                </div>
            </section>
        </div>
    </main>

    <footer class="bg-dark text-white text-center p-4 mt-5">
        <div class="container">
            <p>© 2025 EcoTrend. Promovendo sustentabilidade.</p>
        </div>
    </footer>

    <script src="./bootstrap.bundle.min.js"></script>
</body>
</html>
