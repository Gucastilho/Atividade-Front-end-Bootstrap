<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="stylesheet" href="./bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient-custom sticky-top py-3">
        <div class="container">
            
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="./img/banners/logo.jpg" alt="Logo EcoTrend" class="logo-img">
            </a>

            <button class="navbar-toggler border-0 shadow-none" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center fw-semibold">
                    <li class="nav-item"><a class="nav-link active mx-2" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link mx-2" href="categorias.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link mx-2" href="contato.html">Contato</a></li>
                    
                    <li class="nav-item ms-3">
                        <a href="#" class="text-white position-relative mt-1">
                            <i class="fa fa-shopping-cart fa-lg"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark" style="font-size: 0.6rem;">
                                2
                            </span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm p-4">
                    <h2 class="text-center mb-4 text-success">Fale Conosco</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" placeholder="Seu nome" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="exemplo@email.com" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Assunto</label>
                            <input type="text" class="form-control" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mensagem</label>
                            <textarea class="form-control" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Enviar Mensagem</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-custom pt-5 pb-3 mt-5">
        <div class="container">
            <div class="row mb-4">
                
                <div class="col-md-4 mb-3">
                    <a href="index.html" class="d-flex align-items-center text-decoration-none mb-3">
                        <img src="./img/banners/logo.jpg" alt="Logo EcoTrend" class="logo-img-footer">
                    </a>
                    <p class="small text-light">Sua loja especializada em produtos sustentáveis. Focados em promover um estilo de vida mais consciente e sustentável.</p>
                </div>
                
                <div class="col-md-4 mb-3">
                    <h5 class="fw-bold mb-3 text-white">Navegue</h5>
                    <ul class="list-unstyled small">
                        <li><a href="index.html" class="text-light text-decoration-none mb-2 d-block">Página Inicial</a></li>
                        <li><a href="categorias.html" class="text-light text-decoration-none mb-2 d-block">Nossos Produtos</a></li>
                        <li><a href="contato.html" class="text-light text-decoration-none mb-2 d-block">Fale Conosco</a></li>
                    </ul>
                </div>
                
                <div class="col-md-4 mb-3">
                    <h5 class="fw-bold mb-3 text-white">Redes Sociais</h5>
                    <div class="d-flex gap-2">
                        <a href="#" class="footer-social-icon"><i class="fab fa-instagram fa-lg"></i></a>
                        <a href="#" class="footer-social-icon"><i class="fab fa-facebook-f fa-lg"></i></a>
                        <a href="#" class="footer-social-icon"><i class="fab fa-linkedin-in fa-lg"></i></a>
                    </div>
                </div>

            </div>
            
            <hr class="border-light opacity-25">
            
            <div class="text-center small mt-3">
                <p class="mb-0 text-light">©FIAP - Front-end Design - CP4</p>
            </div>
        </div>
    </footer>

    <script src="./bootstrap.bundle.min.js"></script>
